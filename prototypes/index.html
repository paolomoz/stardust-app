<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>stardust</title>
<link rel="stylesheet" href="app.css" />
<style>
  body { background: var(--bg); overflow: hidden; }
  .landing { height: 100vh; display: grid; place-items: center; position: relative; padding: 24px; }
  .dust { position: absolute; inset: 0; pointer-events: none;
    background-image:
      radial-gradient(1.4px 1.4px at 16% 26%, rgba(26,31,56,0.10), transparent 60%),
      radial-gradient(1px 1px at 80% 18%, rgba(26,31,56,0.08), transparent 60%),
      radial-gradient(1.2px 1.2px at 28% 78%, rgba(26,31,56,0.07), transparent 60%),
      radial-gradient(1px 1px at 72% 80%, rgba(26,31,56,0.07), transparent 60%),
      radial-gradient(0.9px 0.9px at 50% 12%, rgba(26,31,56,0.06), transparent 60%),
      radial-gradient(0.9px 0.9px at 90% 62%, rgba(26,31,56,0.06), transparent 60%),
      radial-gradient(0.8px 0.8px at 10% 58%, rgba(26,31,56,0.06), transparent 60%); }
  .hero { position: relative; z-index: 1; width: 100%; max-width: 560px; text-align: center; }
  .hero .star { width: 54px; height: 54px; margin: 0 auto 26px; display: block; }
  .hero h1 { font: 600 clamp(52px, 9vw, 92px)/0.92 var(--display); letter-spacing: -0.04em; margin: 0; color: var(--fg); }
  .hero .tag { font: 500 13px/1 var(--mono); letter-spacing: 0.14em; color: var(--amber-deep); margin: 18px 0 0; }
  .hero .tag .op { color: var(--fg-faint); padding: 0 4px; }
  .hero .sub { margin: 22px auto 0; max-width: 42ch; color: var(--fg-muted); font-size: 16px; line-height: 1.55; }
  .field { margin: 34px auto 0; max-width: 480px; display: flex; align-items: center; gap: 10px; background: var(--surface); border: 1px solid var(--hairline); border-radius: 14px; padding: 12px 12px 12px 18px; box-shadow: 0 8px 28px -16px rgba(26,31,56,0.22); transition: border-color .2s var(--ease), box-shadow .2s var(--ease); }
  .field:focus-within { border-color: rgba(201,130,45,0.55); box-shadow: 0 0 0 3px rgba(201,130,45,0.14), 0 8px 28px -16px rgba(26,31,56,0.22); }
  .field .globe { color: var(--fg-faint); flex: none; }
  .field input { flex: 1; background: none; border: none; outline: none; color: var(--fg); font: 400 16px/1.4 var(--text); min-width: 0; }
  .field input::placeholder { color: var(--fg-faint); }
  .field .send { width: 38px; height: 38px; border-radius: 10px; flex: none; background: var(--amber); color: var(--ink); box-shadow: inset 0 0 0 1px rgba(201,130,45,0.4); display: grid; place-items: center; transition: background .2s var(--ease); }
  .field .send:hover { background: var(--amber-light); }
  .recents { margin: 18px 0 0; display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
  .recents .lbl { font: 500 11px/22px var(--mono); letter-spacing: 0.12em; text-transform: uppercase; color: var(--fg-faint); }
  .chip { font-size: 13px; color: var(--fg-dim); padding: 4px 11px; border-radius: 999px; border: 1px solid var(--hairline-soft); background: var(--surface); transition: color .15s var(--ease), border-color .15s var(--ease); }
  .chip:hover { color: var(--fg); border-color: var(--hairline); }
  .corner { position: absolute; bottom: 20px; left: 0; right: 0; text-align: center; font: 500 11px/1 var(--mono); letter-spacing: 0.12em; color: var(--fg-faint); z-index: 1; }
</style>
</head>
<body>
  <div class="landing">
    <div class="dust"></div>
    <div class="hero fade">
      <svg class="star" viewBox="0 0 24 24" aria-hidden="true">
        <g fill="#e8b95e">
          <rect x="10" y="1" width="4" height="4"/><rect x="10" y="5.5" width="4" height="4" opacity=".6"/>
          <rect x="10" y="19" width="4" height="4"/><rect x="10" y="14.5" width="4" height="4" opacity=".6"/>
          <rect x="1" y="10" width="4" height="4"/><rect x="5.5" y="10" width="4" height="4" opacity=".6"/>
          <rect x="19" y="10" width="4" height="4"/><rect x="14.5" y="10" width="4" height="4" opacity=".6"/>
        </g>
        <rect x="8.5" y="8.5" width="7" height="7" fill="#ffd98a"/>
      </svg>
      <h1>stardust</h1>
      <p class="tag">brief <span class="op">+</span> seed <span class="op">=</span> star</p>
      <p class="sub">Redesign any website and ship it to AEM. Paste a URL — stardust reads the brand, proposes directions, and you steer from there.</p>

      <div class="field">
        <svg class="globe" width="18" height="18" viewBox="0 0 18 18"><circle cx="9" cy="9" r="7" fill="none" stroke="currentColor" stroke-width="1.3"/><path d="M2 9h14M9 2c2 2.4 2 11.6 0 14M9 2c-2 2.4-2 11.6 0 14" fill="none" stroke="currentColor" stroke-width="1.1"/></svg>
        <input type="text" value="https://www.knack.com/" data-nav-enter="working.html" aria-label="website URL" />
        <button class="send" data-nav="working.html" aria-label="start">
          <svg width="17" height="17" viewBox="0 0 16 16"><path d="M2 8h10M8 4l4 4-4 4" fill="none" stroke="#0a1024" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </div>

      <div class="recents">
        <span class="lbl">recent</span>
        <button class="chip" data-nav="working.html">knack.com</button>
        <button class="chip" data-nav="working.html">theroadhome.org</button>
        <button class="chip" data-nav="working.html">beermaker.co</button>
      </div>
    </div>
    <div class="corner">ADOBE · STARDUST · v0.1</div>
  </div>
  <script src="app.js"></script>
</body>
</html>
